# =============================================================================
# pdfMan — application configuration
# =============================================================================

# -----------------------------------------------------------------------------
# DataSource — PostgreSQL (prod/dev)
# -----------------------------------------------------------------------------
%dev.quarkus.datasource.db-kind=postgresql
#%quarkus.datasource.username=${DB_USERNAME:postgres}
#%quarkus.datasource.password=${DB_PASSWORD:postgres}
%dev.quarkus.datasource.username=pdfman
%dev.quarkus.datasource.password=mysecretpassword
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/pdfman

%prod.quarkus.datasource.username=pdfman
%prod.quarkus.datasource.password=mysecretpassword
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/pdfman


# JDBC URL is intentionally omitted here so that the %test profile's Dev Services
# can inject the dynamic Testcontainers URL. Set DB_URL env var for prod/dev.
#%dev.quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/pdfman}
#%dev.quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://127.0.0.1:5432/pdfman}
#%dev.quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://0.0.0.0:5432/pdfman}
%prod.quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/pdfman}

# -----------------------------------------------------------------------------
# HTTP body size limits
# -----------------------------------------------------------------------------
quarkus.http.limits.max-body-size=10M
quarkus.http.limits.max-form-attribute-size=5M
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration


# -----------------------------------------------------------------------------
# Hibernate ORM
# -----------------------------------------------------------------------------
quarkus.hibernate-orm.database.generation=update

# -----------------------------------------------------------------------------
# Storage backend — default to filesystem (dev/prod override via env)
# -----------------------------------------------------------------------------
# Active storage profile: "filesystem" or "s3"
app.storage.backend=filesystem

# Filesystem storage base directory
app.storage.filesystem.base-dir=${STORAGE_BASE_DIR:./storage}

# S3 storage configuration
quarkus.s3.aws.region=${AWS_REGION:us-east-1}
quarkus.s3.aws.credentials.type=default
app.storage.s3.bucket=${S3_BUCKET:pdfman-bucket}

# -----------------------------------------------------------------------------
# OpenAPI / Swagger UI
# -----------------------------------------------------------------------------
quarkus.smallrye-openapi.info-title=pdfMan API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=RESTful microservice for PDF document and template management
quarkus.swagger-ui.always-include=true

# =============================================================================
# %dev profile overrides
# =============================================================================
%dev.quarkus.datasource.username=pdfman
%dev.quarkus.datasource.password=pdfman
%dev.quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/pdfman}
%dev.quarkus.hibernate-orm.log.sql=true
%dev.app.storage.backend=filesystem
%dev.app.storage.filesystem.base-dir=.\documents

# =============================================================================
# %test profile overrides — Testcontainers + MockStorageBackend
# =============================================================================
# Use port 8083 for tests to avoid conflict with pdfAdministrator (8081)
%test.quarkus.http.port=8083
%test.quarkus.http.test-port=8083
# Let Quarkus Dev Services spin up a PostgreSQL Testcontainer automatically
%test.quarkus.datasource.db-kind=postgresql
%test.quarkus.datasource.devservices.enabled=true
%test.quarkus.datasource.devservices.image-name=postgres:16-alpine

# Flyway still runs migrations against the test container
%test.quarkus.flyway.migrate-at-start=true

# Disable real S3 in tests — MockStorageBackend @Alternative is activated instead
%test.quarkus.s3.devservices.enabled=false
%test.app.storage.backend=mock

# Reduce log noise in tests
%test.quarkus.log.level=WARN
%test.quarkus.log.category."com.pdfman".level=DEBUG
