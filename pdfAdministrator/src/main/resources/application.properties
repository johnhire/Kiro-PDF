# =============================================================================
# pdfAdministrator — application configuration
# =============================================================================

# -----------------------------------------------------------------------------
# HTTP port — run on 8081 to avoid conflict with pdfMan (8080)
# -----------------------------------------------------------------------------
quarkus.http.port=8081

# -----------------------------------------------------------------------------
# PdfManClient — MicroProfile REST Client base URL
# -----------------------------------------------------------------------------
# Override via PDFMAN_URL environment variable in production/staging.
# Quarkus REST client config key style (matches @RegisterRestClient(configKey = "pdf-man-client"))
quarkus.rest-client.pdf-man-client.url=${PDFMAN_URL:http://localhost:8080}
quarkus.rest-client.pdf-man-client.scope=jakarta.inject.Singleton
# Legacy MP REST Client style (kept for compatibility)
com.pdfadministrator.client.PdfManClient/mp-rest/url=${PDFMAN_URL:http://localhost:8080}
com.pdfadministrator.client.PdfManClient/mp-rest/scope=jakarta.inject.Singleton

# -----------------------------------------------------------------------------
# MyFaces / JSF settings
# -----------------------------------------------------------------------------
# Project stage: Development shows detailed error pages; Production disables them.
quarkus.myfaces.project-stage=Production
# Enable CDI-managed beans (ViewScoped, SessionScoped, etc.)
quarkus.myfaces.annotation-scan-packages=com.pdfadministrator

# -----------------------------------------------------------------------------
# PrimeFaces settings
# -----------------------------------------------------------------------------
# Theme: saga (popular light theme)
quarkus.myfaces.context-parameters.primefaces.THEME=saga
# Font-awesome icons
quarkus.myfaces.context-parameters.primefaces.FONT_AWESOME=true

# -----------------------------------------------------------------------------
# SmallRye Fault Tolerance defaults
# -----------------------------------------------------------------------------
# Default timeout for REST client calls (milliseconds)
mp.fault.tolerance.timeout.value=5000

# =============================================================================
# %dev profile overrides
# =============================================================================
%dev.quarkus.http.port=8081
%dev.quarkus.rest-client.pdf-man-client.url=${PDFMAN_URL:http://localhost:8080}
%dev.com.pdfadministrator.client.PdfManClient/mp-rest/url=${PDFMAN_URL:http://localhost:8080}
%dev.quarkus.myfaces.project-stage=Development
%dev.quarkus.log.category."com.pdfadministrator".level=DEBUG

# =============================================================================
# %test profile overrides
# =============================================================================
%test.quarkus.http.port=8082
# Point to a mock/stub pdfMan URL in tests — override per test class as needed
%test.quarkus.rest-client.pdf-man-client.url=http://localhost:8080
%test.com.pdfadministrator.client.PdfManClient/mp-rest/url=http://localhost:8080
%test.quarkus.log.level=WARN
%test.quarkus.log.category."com.pdfadministrator".level=DEBUG
